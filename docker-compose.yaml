services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: photorate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 00634724
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/photorate
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 00634724
